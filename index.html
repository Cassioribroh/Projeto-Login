<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mediaquery.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                <!-- Imagem -->
                <div id="texto">
                    <h1>Seja Bem-vindo(a) </h1>
                    <p>Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                </div>
            </div>
            <div id="formulario">
                <h1>Login</h1> 
                <form action="login.py" method="post" autocomplete="on">
                    <div class="campo">
                        <span class="material-icons">person</span>
                        <input type="email" name="login" id="ilogin" required placeholder="E-mail" autocomplete="email" maxlength="30">
                        <label for="ilogin">Login</label>
                    </div> 
                        <div class="campo">                        
                        <span class="material-icons">vpn_key</span>
                        <input type="password" name="senha" id="isenha" required minlength="8" maxlength="12" placeholder="Senha" autocomplete="current-password">
                        <label for="isenha">Senha</label>
                    </div>                    <input type="submit" value="Entrar"> 
                    <a class="botao" href="Esqueci.html">Esqueci a senha</a>
                </form>    
            </div>
        </section>
    </main>
</body>
</html>
